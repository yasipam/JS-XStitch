<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cross Stitch Editor</title>
    <link rel="stylesheet" href="styles.css">

    <script type="importmap">
    {
      "imports": {
        "jspdf": "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
      }
    }
    </script>
</head>

<body>
    <h1>✨ Kriss Kross ✨</h1>

    <div id="app">

        <div id="topToolbar">
            <input type="file" id="upload" accept="image/*" style="display:none;">
            <input type="file" id="oxsUpload" accept=".oxs" style="display:none;">
            <button id="uploadBtn" title="Upload Image">🖼️ Upload Image</button>
            <button id="oxsImportBtn" title="Import OXS File">📥 Import OXS</button>
            <button id="clearAllBtn" title="Clear All (Ctrl+Shift+X)">🗑️ Clear All</button>
            <button id="resetOriginalBtn" title="Reset to Original Upload">↩️ Reset to Original</button>
            <button id="pencilBtn" class="active">Pencil</button>
            <button id="eraserBtn">Eraser</button>
            <button id="undoBtn" title="Undo (Ctrl+Z)">↶ Undo</button>
            <button id="redoBtn" title="Redo (Ctrl+Y)">↷ Redo</button>
            <button id="fillBtn">Fill</button>
            <button id="toolPicker">Picker</button>
            <button id="zoomOutBtn">Zoom In</button>
            <button id="zoomInBtn">Zoom Out</button>
            <button id="resetViewBtn">Reset View</button>
        </div>

        <div id="layout">

            <aside id="leftSidebar">
                <h2>Settings</h2>

                <div id="hoverPreview" style="width:24px;height:24px;border:1px solid #000;background:transparent;"></div>

                <div class="sliderRow">
                    <label for="maxSizeSlider">Max Size (longest edge)</label>
                    <div class="sliderWithInput">
                        <input type="range" id="maxSizeSlider" min="4" max="300" value="80">
                        <input type="number" id="maxSizeInput" min="4" max="300" value="80">
                    </div>
                </div>

                <div class="panel">
                    <h3 class="panelTitle">📏 Size Settings</h3>
                    <label class="toggle">
                        <input type="checkbox" id="pixelArtMode">
                        <span class="slider"></span>
                        Image is already Pixel Art
                    </label>
                    <p id="pixelArtWarning" style="color: #c10054; font-size: 0.8rem; display: none;">
                        Image too large for Pixel Mode (Max 300px).
                    </p>
                </div>

                <hr class="divider">

                <div class="sliderRow">
                    <label for="maxColours">Maximum No. Colours</label>
                    <div class="sliderWithInput">
                        <input type="range" id="maxColours" min="1" max="150" value="30">
                        <input type="number" id="maxColoursInput" min="1" max="150" value="30">
                        <div id="actualColoursUsed" style="font-size: 0.9em; color: #666; margin-top: 5px;">
        Actual Colours: 0
                    </div>
                </div>

                <div class="sliderRow">
                    <label for="mergeNearest">Merge Similar Colors</label>
                    <div class="sliderWithInput">
                        <input type="range" id="mergeNearest" min="0" max="5" value="0" step="1">
                        <span id="mergeNearestVal" style="min-width: 40px;">Off</span>
                    </div>
                </div>
                
                <hr class="divider">

                <div class="panel">
                    <h3 class="panelTitle">Levels Adjustments</h3>
                    <label>Brightness</label>
                    <input type="range" id="brightness" min="-10" max="10" value="0">

                    <label>Saturation</label>
                    <input type="range" id="saturation" min="-10" max="10" value="0">

                    <label>Contrast</label>
                    <input type="range" id="contrast" min="-10" max="10" value="0">
                </div>

                <div class="panel">
                    <h3 class="panelTitle">Colour Distances</h3>
                    
                    <label class="radioRow">
                        <input type="radio" name="colorDistance" value="euclidean" checked> Euclidean
                    </label>
                    
                    <label class="radioRow">
                        <input type="radio" name="colorDistance" value="bt709"> BT‑709
                    </label>

                    <label class="radioRow">
                        <input type="radio" name="colorDistance" value="cie76"> CIE76
                    </label>

                    <label class="radioRow">
                        <input type="radio" name="colorDistance" value="cie94"> CIE94
                    </label>

                    <label class="radioRow">
                        <input type="radio" name="colorDistance" value="ciede2000"> CIEDE2000
                    </label>
                </div>

                <div class="panel">
                    <h3 class="panelTitle">Colour Adjustments</h3>
                    <label>More Green - More Magenta</label>
                    <input type="range" id="greenToMagenta" min="-10" max="10" value="0">

                    <label>More Cyan - More Red</label>
                    <input type="range" id="cyanToRed" min="-10" max="10" value="0">

                    <label>More Yellow - More Blue</label>
                    <input type="range" id="blueToYellow" min="-10" max="10" value="0">
                </div>
            
            <div class="setting-group">
                <label>
                    <input type="checkbox" id="reduceIsolatedStitches">
                    Reduce Isolated Stitches
                </label>
            </div>

            <div class="setting-group">
                <label for="antiNoise">Anti‑Noise Smoothing (Passes)</label>
                <input type="range" id="antiNoise" min="0" max="10" value="0">
                <span id="antiNoiseVal">0</span>
            </div>

            <div class="panel">
                <h3 class="panelTitle">Stitch Filtering</h3>
                <label for="minOccurrenceInput">Min. Stitches per Color</label>
                <input type="number" id="minOccurrenceInput" min="1" value="1" style="width: 60px;">
                <button id="reapplyFilterBtn" style="margin-top: 6px;">Re-apply Filter</button>
            </div>
                        
            </aside>

            <main id="mainArea">
                <iframe id="canvasFrame" src="canvas-env.html" style="width:100%; height:100%; border:none;"></iframe>
            </main>

            <aside id="rightSidebar">
                    <div class="tabs">
                        <button class="tab-link active" onclick="openTab(event, 'PaletteTab')">Palette</button>
                        <button class="tab-link" onclick="openTab(event, 'ThreadsTab')">Threads</button>
                    </div>

                    <div id="PaletteTab" class="tab-content" style="display: block;">
                        <div class="panel">
                            <h3 class="panelTitle">Color Picker</h3>
                            <button id="toggleList">Click to search ▼</button>
                            <div id="paletteListContainer" style="display:none;">
                                <input id="paletteSearch" type="text" placeholder="Search DMC…">
                                <div id="paletteList"></div>
                            </div>
                            <div id="paletteGrid"></div>
                        </div>
                        <div class="panel" id="patternSizePanel">
                            <div class="panelTitle">Pattern Size</div>
                            <div id="patternSizeDisplay">--</div>
                        </div>
                    </div>

                    <div id="ThreadsTab" class="tab-content" style="display: none;">
                        <div class="panel">
                            <h3 class="panelTitle">Project Threads</h3>
                            <table id="threadsTable">
                                <thead>
                                    <tr>
                                        <th>Clr</th>
                                        <th>DMC</th>
                                        <th>Stitches</th>
                                        <th>Skeins</th>
                                    </tr>
                                </thead>
                                <tbody id="threadsTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </aside>
            </div>

            <footer id="bottomPalette">
                <div id="exportFooter">
                    <div class="footer-group">
                        <label>PDF Layout:</label>
                        <select id="pdfTypeSelect">
                            <option value="PRINTABLE">Printable (To-Size)</option>
                            <option value="STANDARD">Standard (Tiled)</option>
                        </select>
                    </div>

                    <div class="footer-group">
                        <label>Aida Count:</label>
                        <select id="fabricCountSelect">
                            <option value="11">11ct</option>
                            <option value="14" selected>14ct</option>
                            <option value="16">16ct</option>
                            <option value="18">18ct</option>
                        </select>
                    </div>

                    <div class="footer-group">
                        <label>Print Mode:</label>
                        <select id="exportModeSelect">
                            <option value="filled">Filled Boxes (Corners)</option>
                            <option value="cross">Crosses (X-stitch)</option>
                            <option value="symbol">Symbols & Colors</option>
                        </select>
                    </div>

                    <div class="footer-group">
                        <label class="toggle">
                            <input type="checkbox" id="stampedMode">
                            <span class="slider"></span>
                            Enable Stamped Colors
                        </label>

                        <div id="stampedControls" style="display: none; margin-top: 5px;">
                            <label for="stampedHue">Hue Shift</label>
                            <input type="range" id="stampedHue" min="0" max="10" value="0" style="width: 80px;">
                            <span id="stampedHueVal">0°</span>
                        </div>
                    </div>

                    <div class="footer-group">
                        <label class="toggle">
                            <input type="checkbox" id="addPatternKeeper">
                            <span class="slider"></span>
                            Pattern Keeper Page
                        </label>
                    </div>

                    <div class="footer-buttons">
                        <button id="exportPDFBtn">Export PDF</button>
                        <button id="exportPngBtn">Export PNG</button>
                        <button id="exportOxsBtn">Export OXS</button>
                    </div>
                </div>
            </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
